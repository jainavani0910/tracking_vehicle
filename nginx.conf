worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Enable compression for API performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream backend_servers {
        # Use ip_hash to ensure sticky sessions.
        # This is CRITICAL for Socket.IO: client connections (HTTP handshakes and polling) 
        # MUST route to the same server instance until upgraded to WebSockets.
        ip_hash;

        # Node.js instances
        server localhost:4001;
        server localhost:4002;
        server localhost:4003;

        # Keep connections alive to upstream servers for lower latency
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Direct HTTP & WebSocket API requests to the upstream pool
        location / {
            proxy_pass http://backend_servers;

            # HTTP headers required for WebSockets upgrade protocol
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard client identity headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts to prevent Nginx from dropping idle WebSocket tunnels (default is 60s)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for instant, real-time message delivery
            proxy_buffering off;
        }

        # Dedicated path for health check routing
        location /health {
            proxy_pass http://backend_servers/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
